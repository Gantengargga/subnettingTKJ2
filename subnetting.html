<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubnetMaster Grandmaster | Fixed by Argha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-text { color: #06b6d4; text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .scanline { width: 100%; height: 2px; background: rgba(6, 182, 212, 0.05); position: fixed; top: 0; z-index: 999; animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body class="p-4 lg:p-10">
    <div class="scanline"></div>

    <div class="max-w-[1200px] mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="bg-cyan-500 p-3 rounded-xl shadow-lg shadow-cyan-500/20">
                    <i data-lucide="network" class="text-slate-950 w-6 h-6"></i>
                </div>
                <h1 class="text-2xl font-black tracking-tighter">ARGHA <span class="text-cyan-400">NET-CORE</span></h1>
            </div>
            <div id="statusIndicator" class="text-[10px] font-bold uppercase tracking-widest text-emerald-400 flex items-center gap-2">
                <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span> Engine Active
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-4">
                <div class="glass-panel p-6 rounded-3xl border-l-4 border-l-cyan-500">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">Input IP Address</label>
                    <input type="text" id="ipInput" value="192.168.1.1" placeholder="e.g. 10.0.0.1"
                        class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 focus:ring-2 focus:ring-cyan-500 outline-none font-mono text-lg mb-4">
                    
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-2">Prefix Length</label>
                    <select id="cidrInput" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 outline-none font-mono text-lg mb-6"></select>

                    <button onclick="calculate()" class="w-full bg-cyan-500 hover:bg-cyan-400 py-4 rounded-xl text-slate-950 font-black uppercase tracking-widest transition-all">
                        Process Subnet
                    </button>
                </div>

                <div class="glass-panel p-6 rounded-3xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">Network Specification</p>
                    <div id="netInfo" class="text-sm font-bold text-cyan-400 italic">Standby...</div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass-panel p-6 rounded-3xl">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Network ID</p>
                        <p id="resNet" class="text-2xl font-mono font-bold">-</p>
                    </div>
                    <div class="glass-panel p-6 rounded-3xl">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Broadcast</p>
                        <p id="resBcast" class="text-2xl font-mono font-bold">-</p>
                    </div>
                </div>

                <div class="glass-panel p-6 rounded-3xl">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Usable Host Range</p>
                    <p id="resRange" class="text-xl font-mono font-bold text-cyan-400">-</p>
                    <div class="mt-4 pt-4 border-t border-white/5 flex justify-between text-[10px] font-bold text-slate-500">
                        <span>SUBNET MASK: <span id="resMask" class="text-slate-300">0.0.0.0</span></span>
                        <span>TOTAL HOSTS: <span id="resHosts" class="text-slate-300">0</span></span>
                    </div>
                </div>

                <div class="glass-panel rounded-3xl overflow-hidden">
                    <div class="p-4 bg-white/5 font-bold text-[10px] uppercase tracking-widest text-slate-400">Subnet Segments Explorer</div>
                    <div class="overflow-x-auto max-h-[300px] no-scrollbar">
                        <table class="w-full text-left font-mono text-xs">
                            <tbody id="tableBody" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-20 text-center py-10 border-t border-white/5">
            <h2 class="text-4xl font-black tracking-tighter opacity-20 italic">MADE BY ARGHA</h2>
        </footer>
    </div>

    <script>
        // Inisialisasi CIDR
        const cidrSelect = document.getElementById('cidrInput');
        for(let i=32; i>=1; i--) {
            let opt = document.createElement('option');
            opt.value = i; opt.textContent = `/${i}`;
            if(i===24) opt.selected = true;
            cidrSelect.appendChild(opt);
        }

        // Helper: Convert IP String to Unsigned Int
        function ipToLong(ip) {
            let components = ip.split('.');
            if(components.length !== 4) return null;
            return components.reduce((res, item) => (res << 8n) + BigInt(item), 0n);
        }

        // Helper: Convert Long to IP String
        function longToIp(long) {
            return [
                (long >> 24n) & 0xffn,
                (long >> 16n) & 0xffn,
                (long >> 8n) & 0xffn,
                long & 0xffn
            ].join('.');
        }

        function calculate() {
            const ipStr = document.getElementById('ipInput').value.trim();
            const cidr = parseInt(document.getElementById('cidrInput').value);
            
            const ipLong = ipToLong(ipStr);
            if(ipLong === null) return alert("Invalid IP Address!");

            // Menggunakan BigInt untuk presisi total agar tidak "gabisa di subnet"
            const maskLong = (0xffffffffn << BigInt(32 - cidr)) & 0xffffffffn;
            const netLong = ipLong & maskLong;
            const bcastLong = netLong + (0xffffffffn ^ maskLong);
            const totalHosts = bcastLong - netLong + 1n;
            const usable = totalHosts > 2n ? totalHosts - 2n : 0n;

            // Update UI
            document.getElementById('resNet').innerText = longToIp(netLong);
            document.getElementById('resBcast').innerText = longToIp(bcastLong);
            document.getElementById('resMask').innerText = longToIp(maskLong);
            document.getElementById('resHosts').innerText = usable.toLocaleString();
            document.getElementById('resRange').innerText = cidr <= 30 ? 
                `${longToIp(netLong + 1n)} - ${longToIp(bcastLong - 1n)}` : "Point-to-Point";

            // Deteksi Tipe
            const first = Number(netLong >> 24n);
            let type = "Public Network";
            if(first === 10 || (first === 172 && Number((netLong >> 16n) & 0xffn) >= 16) || (first === 192 && Number((netLong >> 16n) & 0xffn) === 168)) type = "Private Network";
            document.getElementById('netInfo').innerText = `${type} (Class ${first < 128 ? 'A' : first < 192 ? 'B' : 'C'})`;

            // Table Generator
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            for(let i=0; i<20; i++) {
                let sNet = netLong + (BigInt(i) * totalHosts);
                if(sNet > 0xffffffffn) break;
                let sBcast = sNet + totalHosts - 1n;
                tbody.innerHTML += `<tr class="hover:bg-white/5"><td class="p-3 text-slate-500">#${i}</td><td class="p-3 font-bold">${longToIp(sNet)}</td><td class="p-3 text-slate-400">${longToIp(sBcast)}</td></tr>`;
            }
        }

        lucide.createIcons();
        calculate(); // Run once
    </script>
</body>
</html>
