<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argha Systems | VLSM Plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Kamu bisa menggunakan tag style yang persis sama dengan subnet.html -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap');
        :root { --accent: #3b82f6; --bg-dark: #050505; --card-bg: rgba(17, 17, 17, 0.7); }
        body { background-color: var(--bg-dark); color: white; font-family: 'Plus Jakarta Sans', sans-serif; background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #050505 80%); min-height: 100vh; }
        .studio-card { background: var(--card-bg); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; transition: transform 0.3s ease, border-color 0.3s ease; }
        .input-field { background: rgba(0, 0, 0, 0.3) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        .tab-btn { padding: 10px 20px; font-size: 12px; font-weight: 700; color: #64748b; border-radius: 10px; transition: all 0.3s; text-decoration: none; }
        .tab-btn.active { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .fade-up { animation: fadeUp 0.5s ease out; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="pb-10">

    <nav class="sticky top-0 z-50 px-6 py-4 border-b border-white/5 bg-black/60 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-blue-600 rounded-xl shadow-lg shadow-blue-600/20"><i data-lucide="shield-check" class="text-white w-5 h-5"></i></div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-tight">ARGHA <span class="text-blue-500 italic">SYSTEMS</span></h1>
                    <p class="text-[9px] text-gray-500 font-bold tracking-[0.2em] uppercase">Network Engineering Suite v2.0</p>
                </div>
            </div>
            <div class="flex bg-white/5 p-1 rounded-2xl border border-white/5">
                <!-- Class 'active' diletakkan di VLSM -->
                <a href="subnet.html" class="tab-btn">Subnetting</a>
                <a href="vlsm.html" class="tab-btn active">VLSM Plan</a>
                <a href="calc.html" class="tab-btn">Calc</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 mt-10 fade-up">
        <div class="studio-card p-8">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-4 space-y-6">
                    <div class="bg-blue-500/5 p-4 rounded-xl border border-blue-500/10">
                        <h4 class="text-[10px] font-black text-blue-500 uppercase mb-4 tracking-[0.2em]">Data Perencanaan</h4>
                        <div class="space-y-4">
                            <input type="text" id="majorIP" value="192.168.10.0" class="input-field w-full px-4 py-2 rounded-lg font-bold text-sm" placeholder="Major Network">
                            <div id="vlsmSegments" class="space-y-3">
                                <div class="flex gap-2 p-3 bg-black/40 rounded-xl border border-white/5">
                                    <input type="text" class="bg-transparent flex-1 text-xs font-bold v-name outline-none" value="LAN-Utama">
                                    <input type="number" class="bg-transparent w-16 text-xs font-bold v-host text-blue-400 outline-none text-right" value="50">
                                </div>
                            </div>
                            <button onclick="addVLSMSegment()" class="w-full py-2 border border-dashed border-gray-700 rounded-xl text-[9px] uppercase font-bold hover:border-blue-500/50 transition-all">+ Tambah Segmen</button>
                            <button onclick="calculateVLSM()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-xl uppercase text-xs transition-all">Generate Plan</button>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-8">
                    <div class="overflow-hidden rounded-xl border border-white/5">
                        <table class="w-full text-left text-[11px] font-mono">
                            <thead class="bg-white/5 text-gray-400 uppercase">
                                <tr><th class="p-4">Segmen</th><th class="p-4">Kapasitas</th><th class="p-4">Net/Prefix</th><th class="p-4">Range Host</th></tr>
                            </thead>
                            <tbody id="vlsmTableBody" class="divide-y divide-white/5">
                                <tr><td colspan="4" class="p-10 text-center text-gray-600 italic">Belum ada data</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Logika KHUSUS untuk VLSM
        const ipToLong = (ip) => ip.split('.').reduce((acc, oct) => (BigInt(acc) << 8n) + BigInt(oct), 0n);
        const longToIp = (n) => [(n >> 24n) & 0xffn, (n >> 16n) & 0xffn, (n >> 8n) & 0xffn, n & 0xffn].join('.');

        document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });

        function addVLSMSegment() {
            const div = document.createElement('div');
            div.className = "flex gap-2 p-3 bg-black/40 rounded-xl border border-white/5 animate-in slide-in-from-left";
            div.innerHTML = `<input type="text" class="bg-transparent flex-1 text-xs font-bold v-name outline-none" placeholder="Nama Segmen"> <input type="number" class="bg-transparent w-16 text-xs font-bold v-host text-blue-400 outline-none text-right" placeholder="0">`;
            document.getElementById('vlsmSegments').appendChild(div);
        }

        function calculateVLSM() {
            let currentIP = ipToLong(document.getElementById('majorIP').value);
            const names = document.querySelectorAll('.v-name'), hosts = document.querySelectorAll('.v-host');
            let data = [];
            for(let i=0; i<names.length; i++) {
                let h = parseInt(hosts[i].value); if(h > 0) data.push({ name: names[i].value || `Segmen ${i+1}`, host: h });
            }
            data.sort((a, b) => b.host - a.host);
            const tbody = document.getElementById('vlsmTableBody'); tbody.innerHTML = '';
            
            data.forEach(seg => {
                let prefix = 32 - Math.ceil(Math.log2(seg.host + 2));
                let size = BigInt(Math.pow(2, 32 - prefix));
                let netID = currentIP, bcast = netID + size - 1n;
                tbody.innerHTML += `<tr class="hover:bg-white/5">
                    <td class="p-4 text-blue-400 font-bold">${seg.name}</td>
                    <td class="p-4 text-gray-400">${seg.host} Hosts</td>
                    <td class="p-4 font-bold text-white">${longToIp(netID)}/${prefix}</td>
                    <td class="p-4 text-gray-500">${longToIp(netID+1n)} - ${longToIp(bcast-1n)}</td>
                </tr>`;
                currentIP += size;
            });
        }
    </script>
</body>
</html>
